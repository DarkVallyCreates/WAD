<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-2 sidebar">
            <h4 class="text-center">Exam Panel</h4>
            <a href="#" onclick="showSection('dashboard')">Dashboard</a>
            <a href="#" onclick="showSection('students')">Students</a>
            <a href="#" onclick="showSection('exams')">Exams</a>
            <a href="#" onclick="showSection('results')">Results</a>
        </div>

        <div class="col-md-10 main-content">

            <nav class="navbar navbar-light bg-light mb-4">
                <span class="navbar-brand">Dashboard</span>
            </nav>

            <!-- Dashboard -->
            <div id="dashboardSection" class="section">
                <div class="row">
                    <div class="col-md-3">
                        <div class="card bg-primary text-white p-3">
                            <h5>Total Students</h5>
                            <h2 id="students">0</h2>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card bg-success text-white p-3">
                            <h5>Total Exams</h5>
                            <h2 id="exams">0</h2>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card bg-warning text-white p-3">
                            <h5>Results</h5>
                            <h2 id="results">0</h2>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card bg-danger text-white p-3">
                            <h5>Pass %</h5>
                            <h2 id="pass">0%</h2>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Students -->
            <div id="studentsSection" class="section d-none">
                <h4>Add Student</h4>
                <input type="text" id="studentName" class="form-control mb-2" placeholder="Name">
                <select id="studentResult" class="form-control mb-2">
                    <option value="pass">Pass</option>
                    <option value="fail">Fail</option>
                </select>
                <button class="btn btn-primary" onclick="addStudent()">Add</button>

                <ul class="list-group mt-3" id="studentList"></ul>
            </div>

            <!-- Exams -->
            <div id="examsSection" class="section d-none">
                <h4>Manage Exams</h4>
                <button class="btn btn-success" onclick="addExam()">Add Exam</button>
                <p class="mt-2">Total Exams: <span id="examCount">0</span></p>
            </div>

            <!-- Results -->
            <div id="resultsSection" class="section d-none">
                <h4>Publish Results</h4>
                <button class="btn btn-warning" onclick="publishResult()">Publish Result</button>
                <p class="mt-2">Published: <span id="resultCount">0</span></p>
            </div>

        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
